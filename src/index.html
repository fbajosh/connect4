<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connect 4 Trainer - Training</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./landing.css" />
  </head>
  <body>
    <main class="landing">
      <div class="effects-layer" id="effects-layer" aria-hidden="true"></div>
      <header class="hero">
        <h1 class="title">Connect 4 Trainer</h1>
        <div class="menu-bar" aria-label="Menus">
          <div class="menu-shell">
            <button
              class="menu-toggle"
              id="mode-menu-toggle"
              type="button"
              aria-expanded="false"
              aria-controls="mode-menu"
            >
              Mode
            </button>
            <div class="menu-panel hidden" id="mode-menu" aria-label="Game mode">
              <button class="mode-option" data-mode-option="training" type="button">Training</button>
              <button class="mode-option" data-mode-option="practice" type="button">Practice</button>
              <button class="mode-option" data-mode-option="freeplay" type="button">Freeplay</button>
            </div>
          </div>
          <div class="menu-shell">
            <button
              class="menu-toggle"
              id="tools-menu-toggle"
              type="button"
              aria-expanded="false"
              aria-controls="tools-menu"
            >
              Tools
            </button>
            <div class="menu-panel hidden" id="tools-menu" aria-label="Mode tools">
              <div class="feature-controls hidden" id="feature-controls" aria-label="Training display controls">
                <div class="feature-row">
                  <button class="feature-pulse" id="best-move-pulse" type="button">Best Move</button>
                  <label class="feature-toggle" for="best-move-toggle">
                    <input class="feature-toggle-input" id="best-move-toggle" type="checkbox" />
                    <span class="feature-toggle-slider"></span>
                  </label>
                </div>
                <div class="feature-row">
                  <button class="feature-pulse" id="move-scores-pulse" type="button">Move Scores</button>
                  <label class="feature-toggle" for="move-scores-toggle">
                    <input class="feature-toggle-input" id="move-scores-toggle" type="checkbox" />
                    <span class="feature-toggle-slider"></span>
                  </label>
                </div>
                <div class="feature-row">
                  <button class="feature-pulse" id="game-score-pulse" type="button">Game Score</button>
                  <label class="feature-toggle" for="game-score-toggle">
                    <input class="feature-toggle-input" id="game-score-toggle" type="checkbox" />
                    <span class="feature-toggle-slider"></span>
                  </label>
                </div>
                <div class="feature-row">
                  <button class="feature-pulse" id="dev-mode-pulse" type="button">Dev Mode</button>
                  <label class="feature-toggle" for="dev-mode-toggle">
                    <input class="feature-toggle-input" id="dev-mode-toggle" type="checkbox" />
                    <span class="feature-toggle-slider"></span>
                  </label>
                </div>
              </div>
              <div class="practice-controls hidden" id="practice-controls" aria-label="Practice controls">
                <div class="practice-row">
                  <span class="practice-label">Color</span>
                  <div class="practice-pill-group" role="group" aria-label="Practice color">
                    <button class="practice-pill" data-practice-color="red" type="button">Red</button>
                    <button class="practice-pill" data-practice-color="yellow" type="button">Yellow</button>
                    <button class="practice-pill" data-practice-color="alternate" type="button">Alt</button>
                  </div>
                </div>
                <div class="practice-row">
                  <div class="practice-label-row">
                    <span class="practice-label">Difficulty</span>
                    <span class="practice-value" id="practice-difficulty-value">10</span>
                  </div>
                  <input
                    class="practice-slider"
                    id="practice-difficulty-slider"
                    type="range"
                    min="1"
                    max="10"
                    step="1"
                    value="10"
                    aria-label="Practice difficulty"
                  />
                </div>
                <div class="practice-row practice-toggle-row">
                  <span class="practice-label">Dev Mode</span>
                  <label class="feature-toggle" for="practice-dev-mode-toggle">
                    <input class="feature-toggle-input" id="practice-dev-mode-toggle" type="checkbox" />
                    <span class="feature-toggle-slider"></span>
                  </label>
                </div>
              </div>
              <div class="freeplay-controls hidden" id="freeplay-controls" aria-label="Freeplay controls">
                <div class="practice-row practice-toggle-row">
                  <span class="practice-label">Dev Mode</span>
                  <label class="feature-toggle" for="freeplay-dev-mode-toggle">
                    <input class="feature-toggle-input" id="freeplay-dev-mode-toggle" type="checkbox" />
                    <span class="feature-toggle-slider"></span>
                  </label>
                </div>
              </div>
            </div>
          </div>
        </div>
      </header>
      <div class="board-stage">
        <div class="board-area">
          <div class="board-frame">
            <div class="score-bar" id="score-bar" aria-hidden="true">
              <div class="score-bar-fill" id="score-bar-fill"></div>
            </div>
            <div class="column-score-row" id="column-score-row" aria-hidden="true"></div>
            <div class="board-shell" id="board-shell">
              <div class="preview-piece piece hidden" id="preview-piece" aria-hidden="true"></div>
              <div class="trainer-grid" id="trainer-grid" aria-hidden="true"></div>
              <div class="disc-grid" id="disc-grid" aria-hidden="true"></div>
              <div class="board-grid" id="board-grid" aria-label="Connect 4 grid"></div>
            </div>
          </div>
        </div>
        <button class="reset-control" id="reset-control" type="button">Reset</button>
      </div>
      <section class="dev-panel hidden" id="dev-panel" aria-label="Developer tools">
        <label class="dev-field">
          <span class="dev-label">Dev Output</span>
          <textarea class="dev-textbox" id="dev-output-box" readonly></textarea>
        </label>
      </section>
    </main>
    <script type="module" src="./landing.ts"></script>
  </body>
</html>
